      <path d="M16 24h40M16 41h40M16 58h40" stroke="#82d8bb" stroke-opacity="0.7" stroke-width="3"/>
      <circle cx="51" cy="24" r="3" fill="#e2b35d" stroke="none"/>
      <circle cx="51" cy="41" r="3" fill="#70ddb7" stroke="none"/>
      <circle cx="51" cy="58" r="3" fill="#70ddb7" stroke="none"/>
    </g>
    <g transform="translate(130 45)">
      <rect width="110" height="92" rx="18" fill="#102a25" stroke="#70ddb7" stroke-opacity="0.62"/>
      <path d="M31 42h48M39 58h32" stroke="#84d9bd" stroke-width="4"/>
      <path d="M55 18 73 25v14c0 12-7 19-18 24-11-5-18-12-18-24V25Z" fill="#173b33" stroke="#70ddb7" stroke-width="2"/>
      <circle cx="55" cy="34" r="4" fill="#e2b35d" stroke="none"/>
