<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="460" viewBox="0 0 1440 460" role="img" aria-labelledby="title description">
  <title id="title">VDS Guardian</title>
  <desc id="description">Isolated backups and verified recovery for remote Linux servers.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110f"/>
      <stop offset="0.55" stop-color="#0b1b18"/>
      <stop offset="1" stop-color="#07110f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#62d5ad" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#62d5ad" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#183d35"/>
      <stop offset="1" stop-color="#0e2521"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#7eddbb" stroke-opacity="0.055"/>
    </pattern>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1440" height="460" rx="30" fill="url(#background)"/>
  <rect width="1440" height="460" rx="30" fill="url(#grid)"/>
  <ellipse cx="1210" cy="210" rx="360" ry="320" fill="url(#glow)"/>
  <path d="M0 374C306 312 498 432 772 376s432-144 668-65v149H0Z" fill="#0b1715" opacity="0.78"/>
  <rect x="1.5" y="1.5" width="1437" height="457" rx="28.5" fill="none" stroke="#8be3c3" stroke-opacity="0.16" stroke-width="3"/>

  <g transform="translate(78 76)">
    <circle cx="150" cy="150" r="142" fill="#0a1715" stroke="#4e9f86" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="150" cy="150" r="116" fill="url(#glow)" opacity="0.72"/>
    <path d="M150 30 260 72v84c0 72-43 115-110 142C83 271 40 228 40 156V72Z" fill="url(#shield)" stroke="#70ddb7" stroke-width="10"/>
    <path d="m84 119 66 138 66-138h-40l-26 65-26-65Z" fill="#73e1bb"/>
    <circle cx="150" cy="103" r="14" fill="#e2b35d" filter="url(#soft-glow)"/>
  </g>

  <g transform="translate(410 104)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="0" y="34" fill="#70ddb7" font-size="17" font-weight="700" letter-spacing="5">OPEN-SOURCE DISASTER RECOVERY</text>
    <text x="0" y="112" fill="#f1f8f5" font-size="70" font-weight="760" letter-spacing="-3">VDS GUARDIAN</text>
    <text x="2" y="160" fill="#9db8af" font-size="24" font-weight="400">Isolated backups. Verified recovery. No cloud lock-in.</text>

    <g transform="translate(0 206)" font-size="13" font-weight="700" letter-spacing="1.3">
      <rect width="178" height="42" rx="21" fill="#102b25" stroke="#4f9e85" stroke-opacity="0.6"/>
      <circle cx="22" cy="21" r="5" fill="#70ddb7"/>
      <text x="38" y="26" fill="#c7ded6">WINDOWS + LINUX</text>
      <rect x="192" width="190" height="42" rx="21" fill="#102b25" stroke="#4f9e85" stroke-opacity="0.6"/>
      <circle cx="214" cy="21" r="5" fill="#70ddb7"/>
      <text x="230" y="26" fill="#c7ded6">DOCKER-AWARE</text>
      <rect x="396" width="202" height="42" rx="21" fill="#102b25" stroke="#4f9e85" stroke-opacity="0.6"/>
      <circle cx="418" cy="21" r="5" fill="#e2b35d"/>
      <text x="434" y="26" fill="#c7ded6">RESTORE-FIRST</text>
    </g>
  </g>

  <g transform="translate(1080 90)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-30 144h46c38 0 45-52 83-52h32" stroke="#65cba8" stroke-opacity="0.32" stroke-width="2" stroke-dasharray="5 8"/>
    <path d="M-30 144h46c38 0 45 52 83 52h32" stroke="#65cba8" stroke-opacity="0.32" stroke-width="2" stroke-dasharray="5 8"/>
